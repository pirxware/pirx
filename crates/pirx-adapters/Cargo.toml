tket-json-rs = { version = "0.8.3", optional = true }
serde_json = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
tket-json-rs = "0.8.3"
serde_json = { workspace = true }

[lints]
workspace = true
