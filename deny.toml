[advisories]
ignore = [
    # proc-macro-error is unmaintained but pulled in transitively via
    # boolenum 0.1.0 → oq3_semantics 0.7.0.  No newer version of either
    # crate exists upstream (Qiskit/openqasm3_parser).  The advisory is
    # about maintenance status, not a security vulnerability.
    # Revisit when oq3_semantics publishes a release that drops boolenum.
    # https://rustsec.org/advisories/RUSTSEC-2024-0370
    "RUSTSEC-2024-0370",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace path dependencies are not published — skip wildcard check
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
